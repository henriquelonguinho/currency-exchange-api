name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Build Docker image
        run: |
          ./mvnw package -DskipTests --batch-mode --no-transfer-progress
          docker build -t currency-exchange-api:${{ github.sha }} .

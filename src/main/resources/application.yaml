spring:
  application:
    name: currency-exchange-api

  datasource:
    url: jdbc:h2:mem:currency_exchange
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
